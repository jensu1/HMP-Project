<ion-menu contentId="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-title>KeceNews</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <ion-list>
      <ion-item routerLink="/home" routerLinkActive="active-item">
        <ion-icon name="home-outline" slot="start"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-item>
      <ion-item routerLink="/kategori" routerLinkActive="active-item">
        <ion-icon name="list-outline" slot="start"></ion-icon>
        <ion-label>Kategori</ion-label>
      </ion-item>
      <ion-item routerLink="/favorite" routerLinkActive="active-item">
        <ion-icon name="heart-outline" slot="start"></ion-icon>
        <ion-label>My Favorite</ion-label>
      </ion-item>
      <ion-item routerLink="/profile" routerLinkActive="active-item">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-label>Profile</ion-label>
      </ion-item>
      <!-- Logout Button -->
      <!-- <ion-item button (click)="onLogout()" lines="none" class="logout">
        <ion-icon name="log-out-outline" slot="start"></ion-icon>
        <ion-label>Logout</ion-label>
      </ion-item> -->
    </ion-list>
  </ion-content>
</ion-menu>

<div class="ion-page" id="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <div class="title-search">
        <span class="title">KeceNews</span>
        <ion-searchbar
          show-clear-button="focus"
          debounce="1000"
          placeholder="Search"
          (ionInput)="handleInput($event)"
        >
        </ion-searchbar>
      </div>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <!-- jumlah berita -->
    <div class="news-count-container">
      <ion-chip class="news-chip">
        <ion-icon name="newspaper-outline"></ion-icon>
        <ion-label>
          <strong>{{ filteredNews.length }}</strong> Berita
          <span *ngIf="searchTerm"> dari {{ newsList.length }}</span>
        </ion-label>
      </ion-chip>
    </div>

    <ion-list>
      <ion-item *ngFor="let news of filteredNews" lines="full">
        <ion-thumbnail slot="start" (click)="goToDetail(news.id)">
          <img
            [src]="news.foto_utama || 'https://via.placeholder.com/100'"
            [alt]="news.judul"
          />
        </ion-thumbnail>
        <ion-label (click)="goToDetail(news.id)">
          <h2>{{ news.judul }}</h2>
          <p>{{ news.author_name || news.username }} • {{ news.created_at }}</p>
          <p>
            <ion-icon name="eye-outline"></ion-icon> {{ news.view_count || 0 }}x
            dilihat
          </p>
          <p>⭐ Rating: {{ rataRata(news.id) }}/5</p>
        </ion-label>
        <ion-button
          *ngIf="news.user_id == userId"
          slot="end"
          fill="clear"
          color="danger"
          (click)="deleteNews(news.id, $event)"
        >
          <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-item>
    </ion-list>

    <!-- FAB Button -->
    <ion-fab vertical="bottom" horizontal="end" slot="fixed">
      <ion-fab-button (click)="goToAddNews()">
        <ion-icon name="add"></ion-icon>
      </ion-fab-button>
    </ion-fab>
  </ion-content>
</div>
