<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="profile-container">
    <!-- Profile Avatar -->
    <div class="avatar-section">
      <ion-avatar class="profile-avatar">
        <img
          [src]="'https://ui-avatars.com/api/?name=' + userInfo.nama + '&size=200&background=e75a9c&color=fff'"
          [alt]="userInfo.nama"
        />
      </ion-avatar>
      <h2 class="user-name">{{ userInfo.nama }}</h2>
      <p class="username">@{{ userInfo.username }}</p>
    </div>

    <!-- Profile Info Card -->
    <ion-card class="info-card">
      <ion-card-header>
        <ion-card-title>Informasi Akun</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-list lines="none">
          <ion-item>
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-label>
              <p class="label-title">Nama Lengkap</p>
              <h3>{{ userInfo.nama }}</h3>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-icon name="at-outline" slot="start"></ion-icon>
            <ion-label>
              <p class="label-title">Username</p>
              <h3>{{ userInfo.username }}</h3>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-label>
              <p class="label-title">Email</p>
              <h3>{{ userInfo.email }}</h3>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-icon name="calendar-outline" slot="start"></ion-icon>
            <ion-label>
              <p class="label-title">Bergabung Sejak</p>
              <h3>{{ userInfo.created_at }}</h3>
            </ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>

    <!-- Logout Button -->
    <ion-button
      expand="block"
      color="danger"
      class="logout-btn"
      (click)="onLogout()"
    >
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Logout
    </ion-button>
  </div>
</ion-content>
