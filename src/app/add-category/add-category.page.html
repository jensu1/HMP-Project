<ion-menu contentId="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-title>KeceNews</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <ion-list>
      <ion-item routerLink="/home" routerLinkActive="active-item">
        <ion-icon name="home-outline" slot="start"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-item>
      <ion-item routerLink="/kategori" routerLinkActive="active-item">
        <ion-icon name="list-outline" slot="start"></ion-icon>
        <ion-label>Kategori</ion-label>
      </ion-item>
      <ion-item routerLink="/favorite" routerLinkActive="active-item">
        <ion-icon name="heart-outline" slot="start"></ion-icon>
        <ion-label>My Favorite</ion-label>
      </ion-item>
      <ion-item routerLink="/profile" routerLinkActive="active-item">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-label>Profile</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>

<div class="ion-page" id="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-button (click)="goBack()">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
      <ion-title>Tambah Kategori</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <form (ngSubmit)="onSubmit()">
      <ion-card>
        <ion-card-header>
          <ion-card-title>Form Kategori Baru</ion-card-title>
        </ion-card-header>

        <ion-card-content>
          <ion-item>
            <ion-label position="stacked"
              >Nama Kategori <span class="required">*</span></ion-label
            >
            <ion-input
              [(ngModel)]="categoryName"
              name="categoryName"
              type="text"
              placeholder="Masukkan nama kategori"
              required
            ></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Deskripsi</ion-label>
            <ion-textarea
              [(ngModel)]="description"
              name="description"
              rows="4"
              placeholder="Masukkan deskripsi kategori (opsional)"
            ></ion-textarea>
          </ion-item>

          <ion-button
            expand="block"
            type="submit"
            [disabled]="!categoryName || isSubmitting"
            class="submit-btn"
          >
            <ion-icon name="add-circle-outline" slot="start"></ion-icon>
            {{ isSubmitting ? 'Menyimpan...' : 'Tambah Kategori' }}
          </ion-button>
        </ion-card-content>
      </ion-card>
    </form>
  </ion-content>
</div>
