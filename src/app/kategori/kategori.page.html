<ion-menu contentId="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-title>KeceNews</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <ion-list>
      <ion-item routerLink="/home" routerLinkActive="active-item">
        <ion-icon name="home-outline" slot="start"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-item>
      <ion-item routerLink="/kategori" routerLinkActive="active-item">
        <ion-icon name="list-outline" slot="start"></ion-icon>
        <ion-label>Kategori</ion-label>
      </ion-item>
      <ion-item routerLink="/favorite" routerLinkActive="active-item">
        <ion-icon name="heart-outline" slot="start"></ion-icon>
        <ion-label>My Favorite</ion-label>
      </ion-item>
      <ion-item routerLink="/profile" routerLinkActive="active-item">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-label>Profile</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>

<div class="ion-page" id="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title>Kategori</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">
    <!-- Jumlah kategori dan button add -->
    <div class="category-header">
      <div class="news-count-container">
        <ion-chip class="news-chip">
          <ion-icon name="folder"></ion-icon>
          <ion-label>
            <strong>{{ categories.length }}</strong> Kategori
          </ion-label>
        </ion-chip>
      </div>

      <ion-button (click)="goToAddCategory()" class="add-category-btn">
        <ion-icon name="add-circle-outline" slot="start"></ion-icon>
        Tambah
      </ion-button>
    </div>

    <ion-list>
      <ion-item
        *ngFor="let category of categories"
        lines="full"
        button
        (click)="goToCategory(category.id, category.nama_kategori)"
      >
        <ion-icon name="folder-outline" slot="start" color="primary"></ion-icon>
        <ion-label>
          <h2>{{ category.nama_kategori }}</h2>
          <p *ngIf="category.deskripsi">{{ category.deskripsi }}</p>
        </ion-label>
        <ion-icon name="chevron-forward-outline" slot="end"></ion-icon>
      </ion-item>
    </ion-list>
  </ion-content>
</div>
